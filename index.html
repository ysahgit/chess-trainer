<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chess Repertoire Trainer</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#13141b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="https://unpkg.com/cm-chessboard@8/assets/chessboard.css">
<link rel="stylesheet" href="https://unpkg.com/cm-chessboard@8/assets/extensions/markers/markers.css">
<link rel="stylesheet" href="https://unpkg.com/cm-chessboard@8/assets/extensions/promotion-dialog/promotion-dialog.css">

<!-- chess.js plain script — exposes window.Chess -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg2:#13141b;--panel:#21232e;--panel2:#2a2d3a;
  --border:#2e3145;--border2:#393d54;
  --text:#d0d2de;--text2:#f0f1f8;--dim:#585c76;
  --green:#5f9e43;--green-lt:#72bf50;--green-bg:rgba(95,158,67,.18);
  --red:#c0392b;--red-lt:#e05040;--red-bg:rgba(192,57,43,.18);
  --blue:#4a8fd4;--gold:#d4a017;--gold-bg:rgba(212,160,23,.18);--gold-lt:#f0c040;
}
html,body{height:100%;width:100%;background:var(--bg2);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:14px;overflow:hidden;user-select:none}
#app{display:flex;height:100vh;padding:10px 12px;gap:12px;align-items:stretch}
#sidebar{width:250px;flex-shrink:0;order:2}
#sidebar-card{width:100%;height:100%;background:var(--panel);border-radius:14px;
  border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.6);
  display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:10px 14px 9px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo-icon{width:30px;height:30px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo-name{font-size:14px;font-weight:800;color:var(--text2)}.sb-logo-sub{font-size:10px;color:var(--dim)}
.sb-scores{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sbs{flex:1;padding:6px 8px;text-align:center;border-right:1px solid var(--border)}
.sbs:last-child{border-right:none}.sbs .v{display:block;font-size:18px;font-weight:800;line-height:1.1}
.sbs .l{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--dim)}
.sbs.c .v{color:var(--green-lt)}.sbs.w .v{color:var(--red-lt)}
.sb-hdr{padding:5px 12px 3px;font-size:10px;font-weight:700;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--dim);background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
#pgn-panel{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.pgn-row{display:flex;gap:5px;margin-bottom:6px}
.pgn-btn{flex:1;padding:6px 5px;border-radius:7px;border:1px solid var(--border2);
  background:var(--panel2);color:var(--text);cursor:pointer;font-size:11px;font-weight:600;
  text-align:center;display:flex;align-items:center;justify-content:center}
#pgn-paste{width:100%;height:52px;background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:10px;font-family:monospace;
  padding:5px 7px;resize:none;outline:none;user-select:text}
#pgn-paste:focus{border-color:var(--green)}
#pgn-status{font-size:10px;margin-top:4px;min-height:14px;color:var(--dim);word-break:break-all}
#pgn-status.ok{color:var(--green-lt)}#pgn-status.err{color:var(--red-lt)}
#color-pick{display:flex;gap:5px;padding:6px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.cbtn{flex:1;padding:6px 5px;border-radius:7px;border:2px solid var(--border2);
  background:var(--panel2);color:var(--dim);cursor:pointer;font-size:11px;font-weight:700;
  text-align:center;display:flex;align-items:center;justify-content:center;gap:4px}
.cbtn.sw{border-color:#ccc;color:var(--text2);background:rgba(255,255,255,.07)}
.cbtn.sb{border-color:#555;color:#bbb;background:rgba(0,0,0,.2)}
#mode-toggle{display:flex;gap:5px;padding:6px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.mbtn{flex:1;padding:6px 5px;border-radius:7px;border:2px solid var(--border2);
  background:var(--panel2);color:var(--dim);cursor:pointer;font-size:11px;font-weight:700;text-align:center}
.mbtn.active-practice{border-color:var(--green);color:var(--green-lt);background:var(--green-bg)}
.mbtn.active-drill{border-color:var(--gold);color:var(--gold-lt);background:var(--gold-bg)}
#status-card{flex-shrink:0;border-bottom:1px solid var(--border);display:flex;flex-direction:column}
.sb-btn{padding:5px 9px;border-radius:6px;border:1px solid var(--border2);
  background:var(--panel2);color:var(--text);cursor:pointer;font-size:11px;font-weight:600;
  white-space:nowrap;flex-shrink:0}
.sb-btn:disabled{opacity:.3;pointer-events:none}
#annotation{display:none;padding:8px 12px 8px 36px;border-bottom:1px solid var(--border);
  background:rgba(74,143,212,.06);position:relative}
#annotation.show{display:block}
#annotation-icon{position:absolute;left:11px;top:9px;font-size:14px}
#annotation-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
#annotation-text{font-size:11px;color:#a8b0cc;font-style:italic;line-height:1.6}
#movelist-row{padding:6px 12px 5px;border-bottom:1px solid var(--border)}
#movelist-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
#movelist{display:flex;flex-wrap:wrap;gap:1px 2px;font-size:11px;font-family:monospace;max-height:50px;overflow-y:auto}
.ml-n{color:var(--dim);padding:1px 2px}.ml-m{padding:1px 4px;border-radius:3px;color:#383d56}
.ml-m.done{color:var(--text)}.ml-m.current{background:var(--green-bg);color:var(--green-lt);font-weight:700}
.ml-m.annotated{position:relative;padding-right:9px}
.ml-m.annotated::after{content:"";position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;background:var(--blue)}
#prog-row{display:flex;align-items:center;gap:8px;padding:6px 12px}
#prog-track{flex:1;height:4px;background:var(--bg2);border-radius:3px;overflow:hidden}
#prog-fill{height:100%;background:var(--green-lt);border-radius:3px;transition:width .3s}
#prog-txt{font-size:10px;color:var(--dim);width:40px;text-align:right;flex-shrink:0}
#drill-footer{display:none;padding:6px 12px;background:var(--gold-bg);border-bottom:1px solid var(--border);
  flex-shrink:0;font-size:10px;color:var(--gold-lt);gap:6px;align-items:center}
#drill-footer.show{display:flex}#drill-footer-txt{flex:1}
#drill-reset-btn{padding:2px 9px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:700;
  background:transparent;border:1px solid var(--gold);color:var(--gold-lt)}
#btn-next-done-wrap{display:none;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#main{flex:1;min-width:0;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;order:1;overflow:hidden}
#welcome{text-align:center;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:12px}
.w-icon{font-size:56px}#welcome h2{font-size:22px;font-weight:800;color:var(--text2)}
#trainer{display:none;flex-direction:column;align-items:center;gap:6px;width:100%;height:100%;overflow:hidden;justify-content:center}
#bot-strip,#ctrl-row{width:var(--board-size,560px)}
#board-container{flex-shrink:0;box-shadow:0 4px 8px rgba(0,0,0,.45),0 14px 44px rgba(0,0,0,.68);border-radius:4px;overflow:hidden}
.cm-chessboard{--color-move-from-marker:rgba(255,210,0,.7);--color-move-to-marker:rgba(255,210,0,.7);--color-input-marker:rgba(255,210,0,.5)}
.cm-chessboard .board .square.white{fill:#f0d9b5!important}.cm-chessboard .board .square.black{fill:#b58863!important}
.cm-chessboard.border-type-frame .board .border{fill:#2a2d3a!important}
.cm-chessboard.border-type-frame .board .border-inner{fill:#1a1c24!important;stroke:#3d4152!important}
.cm-chessboard .coordinates .coordinate{fill:#6b6f82!important;font-size:11px}
.pstrip{display:flex;align-items:center;gap:8px;background:var(--panel);border-radius:10px;padding:6px 10px;border:1px solid var(--border2)}
.ps-ico img{width:20px;height:20px}.ps-name{font-size:12px;font-weight:700;color:var(--text2)}
.ps-tag{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px}
.tag-you{background:var(--green-bg);color:var(--green-lt);border:1px solid rgba(95,158,67,.4)}
.tag-drill{background:var(--gold-bg);color:var(--gold-lt);border:1px solid rgba(212,160,23,.4)}
#status-icon{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--panel2);border:2px solid var(--border2);margin-left:6px}
#status-msg{flex:1;font-size:12px;font-weight:700;color:var(--text2)}
#bot-strip.s-correct{border-color:var(--green);background:var(--green-bg)}
#bot-strip.s-correct #status-icon{background:var(--green)}#bot-strip.s-correct #status-msg{color:var(--green-lt)}
#bot-strip.s-wrong{border-color:var(--red);background:var(--red-bg)}
#bot-strip.s-wrong #status-icon{background:var(--red)}#bot-strip.s-wrong #status-msg{color:var(--red-lt)}
#bot-strip.s-done{border-color:var(--green);background:var(--green-bg)}
#bot-strip.s-done #status-icon{background:var(--green)}#bot-strip.s-done #status-msg{color:var(--green-lt)}
#bot-strip.s-think{background:rgba(74,143,212,.08)}
#bot-strip.s-think #status-icon{background:var(--blue)}#bot-strip.s-think #status-msg{color:var(--blue)}
#bot-strip.s-drill{border-color:var(--gold);background:var(--gold-bg)}
#bot-strip.s-drill #status-icon{background:var(--gold)}#bot-strip.s-drill #status-msg{color:var(--gold-lt)}
#ctrl-row{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:1}
.btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--panel);color:var(--text);
  cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap}
.btn.g{background:var(--green-bg);border-color:var(--green);color:var(--green-lt)}
.btn.r{background:var(--red-bg);border-color:var(--red);color:var(--red-lt)}
.btn:disabled{opacity:.35;pointer-events:none}
@media(max-width:700px){
  #app{flex-direction:column;padding:6px;gap:6px;overflow-y:auto;height:auto;min-height:100vh}
  #sidebar{width:100%;order:2}#main{order:1;height:auto}
  #trainer{height:auto;justify-content:flex-start}html,body{overflow:auto}
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar"><div id="sidebar-card">
    <div class="sb-logo">
      <div class="sb-logo-icon">♟</div>
      <div><div class="sb-logo-name">Practice</div><div class="sb-logo-sub">Repertoire Trainer</div></div>
    </div>
    <div class="sb-scores">
      <div class="sbs c"><span class="v" id="sc-c">0</span><span class="l">Correct</span></div>
      <div class="sbs w"><span class="v" id="sc-w">0</span><span class="l">Wrong</span></div>
      <div class="sbs"><span class="v" id="sc-pct" style="color:var(--text)">—</span><span class="l">Accuracy</span></div>
    </div>
    <div class="sb-hdr">Load PGN</div>
    <div id="pgn-panel">
      <input type="file" id="pgn-file-input" accept=".pgn,.txt" style="position:absolute;opacity:0;width:0;height:0">
      <div class="pgn-row">
        <label for="pgn-file-input" class="pgn-btn">📂 Open file</label>
        <button class="pgn-btn" onclick="pasteLoad()">↳ Load text</button>
      </div>
      <textarea id="pgn-paste" placeholder="…or paste PGN here"></textarea>
      <div id="pgn-status"></div>
    </div>
    <div class="sb-hdr">Play as</div>
    <div id="color-pick">
      <div class="cbtn sw" id="cbtn-w" onclick="setColor('white')">♔ White</div>
      <div class="cbtn"    id="cbtn-b" onclick="setColor('black')">♚ Black</div>
    </div>
    <div class="sb-hdr">Mode</div>
    <div id="mode-toggle">
      <div class="mbtn active-practice" id="mbtn-practice" onclick="setMode('practice')">📖 Practice</div>
      <div class="mbtn"                 id="mbtn-drill"    onclick="setMode('drill')">🎯 Drill</div>
    </div>
    <div id="status-card">
      <div id="annotation">
        <div id="annotation-icon">💬</div><div id="annotation-label"></div><div id="annotation-text"></div>
      </div>
      <div id="movelist-row"><div id="movelist-lbl">Moves</div><div id="movelist"></div></div>
      <div id="prog-row">
        <div id="prog-track"><div id="prog-fill" style="width:0%"></div></div>
        <div id="prog-txt">0 / 0</div>
      </div>
    </div>
    <div id="btn-next-done-wrap">
      <button class="btn g" style="width:100%;justify-content:center" onclick="nextAfterDone()">Next line →</button>
    </div>
    <div id="drill-footer">
      <span id="drill-footer-txt"></span>
      <button id="drill-reset-btn" onclick="drillReset()">↺ Reset</button>
    </div>
  </div></div>

  <div id="main">
    <div id="welcome">
      <div class="w-icon">♟</div>
      <h2>Repertoire Trainer</h2>
      <p style="color:var(--dim);font-size:13px">Open or paste a PGN to begin</p>
    </div>
    <div id="trainer">
      <div id="board-container"></div>
      <div class="pstrip" id="bot-strip">
        <div class="ps-ico" id="bot-ico"></div>
        <span class="ps-name" id="bot-name"></span>
        <span class="ps-tag"  id="bot-tag"></span>
        <span id="status-icon">♟</span>
        <span id="status-msg">—</span>
        <button class="sb-btn" id="btn-hint" onclick="showHint()" disabled>💡 Hint</button>
        <button class="sb-btn" id="btn-skip" onclick="doSkip()" disabled>⏭ Skip</button>
      </div>
      <div id="ctrl-row">
        <button class="btn g" onclick="restartLine()">↺ Restart</button>
        <button class="btn" id="btn-prev" onclick="prevLine()">‹ Prev</button>
        <button class="btn" id="btn-next" onclick="nextLine()">Next ›</button>
        <button class="btn r" onclick="flipBoard()">⟳ Flip</button>
      </div>
    </div>
  </div>
</div>

<script>
// Everything in a plain script — always available, no import issues

// ── Chess.js helper ──────────────────────────────────────────────
function newChess() {
  var C = null;
  if (typeof window.Chess === "function") C = window.Chess;
  else if (window.Chess && typeof window.Chess.Chess === "function") C = window.Chess.Chess;
  else if (window.Chess && typeof window.Chess.default === "function") C = window.Chess.default;
  if (!C) { setPgnStatus("chess.js not loaded", false); throw new Error("chess.js missing"); }
  return new C();
}

// ── PGN status ───────────────────────────────────────────────────
function setPgnStatus(msg, ok) {
  var el = document.getElementById("pgn-status");
  el.textContent = msg; el.className = ok ? "ok" : "err";
}

// ── File input ───────────────────────────────────────────────────
document.getElementById("pgn-file-input").addEventListener("change", function(e) {
  var file = e.target.files[0];
  if (!file) return;
  setPgnStatus("Reading " + file.name + "…", true);
  var reader = new FileReader();
  reader.onload = function(ev) { loadGames(ev.target.result, file.name); };
  reader.onerror = function() { setPgnStatus("Could not read file", false); };
  reader.readAsText(file);
  e.target.value = "";
});

function pasteLoad() {
  var text = document.getElementById("pgn-paste").value.trim();
  if (!text) { setPgnStatus("Paste PGN text first", false); return; }
  loadGames(text, null);
}

// ── PGN parsing ──────────────────────────────────────────────────
function parsePgn(text) {
  text = text.split("\n").filter(function(l){ return l.trim()[0] !== ";"; }).join("\n");
  text = text.replace(/[!?]+/g, "");
  var games = [];
  var blocks = text.split(/\n(?=\[Event\s)/);
  for (var i = 0; i < blocks.length; i++) {
    if (!blocks[i].trim()) continue;
    var g = parseBlock(blocks[i].trim());
    if (g && g.moves.length) games.push(g);
  }
  if (!games.length) {
    var g = parseBlock(text.trim());
    if (g && g.moves.length) games.push(g);
  }
  return games;
}

function parseBlock(text) {
  var nameMatch = text.match(/\[Event\s+"([^"]+)"\]/);
  var name = nameMatch ? nameMatch[1] : "Line";
  var body = text.replace(/\[[^\]]*\]/g, "").trim();

  // Strip variations
  var flat = "", depth = 0;
  for (var ci = 0; ci < body.length; ci++) {
    var ch = body[ci];
    if (ch === "(") depth++;
    else if (ch === ")") depth--;
    else if (depth === 0) flat += ch;
  }

  // Tokenise: moves and {comments}
  var tokens = [], i = 0;
  while (i < flat.length) {
    if (flat[i] === "{") {
      var end = flat.indexOf("}", i);
      if (end < 0) break;
      tokens.push({ type:"comment", val:flat.slice(i+1,end).trim() });
      i = end + 1;
    } else if (/\s/.test(flat[i])) {
      i++;
    } else {
      var j = i;
      while (j < flat.length && !/[\s{]/.test(flat[j])) j++;
      var tok = flat.slice(i,j);
      var skip = !tok || /^\d+\.+$/.test(tok) || tok==="*"||tok==="1-0"||tok==="0-1"||tok==="1/2-1/2";
      if (!skip) tokens.push({ type:"move", val:tok });
      i = j;
    }
  }

  var engine = newChess();
  var moves = [], pending = "";
  for (var ti = 0; ti < tokens.length; ti++) {
    var t = tokens[ti];
    if (t.type === "comment") { pending = t.val; continue; }
    var r = null;
    try { r = engine.move(t.val); } catch(e){}
    if (!r) try { r = engine.move(t.val.replace(/[+#]$/,"")); } catch(e){}
    if (!r) continue;
    moves.push({ san:r.san, from:r.from, to:r.to,
      promo:r.promotion?r.promotion.toUpperCase():"", comment:pending });
    pending = "";
  }

  if (!moves.length) return null;
  return { name: name + " (" + Math.ceil(moves.length/2) + " moves)", moves:moves };
}

// ── State ────────────────────────────────────────────────────────
var INIT_FEN = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
var chessEngine = null;
var S = {
  games:[], gameIdx:-1, moves:[], moveIdx:0, fen:INIT_FEN,
  playerColor:"white", completed:new Set(), busy:false, scoreC:0, scoreW:0,
  mode:"practice", drillQueue:[], drillDone:new Set()
};

function loadGames(text, filename) {
  try {
    if (!text || !text.trim()) { setPgnStatus("Nothing to load", false); return; }
    var games = parsePgn(text);
    if (!games.length) { setPgnStatus("No valid moves found", false); return; }
    S.games = games; S.completed = new Set();
    setPgnStatus("✓ " + (filename||"") + " — " + games.length + " line(s)", true);
    drillReset();
    selectGame(0);
  } catch(e) { setPgnStatus("Error: " + e.message, false); }
}

// ── Sounds ───────────────────────────────────────────────────────
var _ac = null;
function beep(freq, dur, type, vol) {
  try {
    if (!_ac) _ac = new (window.AudioContext||window.webkitAudioContext)();
    if (_ac.state==="suspended") _ac.resume();
    var o=_ac.createOscillator(), g=_ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    o.type=type||"sine"; o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.14, _ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, _ac.currentTime+dur);
    o.start(); o.stop(_ac.currentTime+dur);
  } catch(e){}
}
function playSound(t) {
  if(t==="move") beep(440,.08);
  else if(t==="wrong"){beep(180,.12,"sawtooth");setTimeout(function(){beep(160,.18,"sawtooth")},80);}
  else if(t==="done"){beep(523,.1);setTimeout(function(){beep(659,.1)},110);setTimeout(function(){beep(784,.18)},220);}
  else if(t==="capture") beep(320,.1,"triangle");
}

// ── Board sizing ─────────────────────────────────────────────────
var _pr=null, _ls=0;
function applyBoardSize() {
  if(_pr) cancelAnimationFrame(_pr);
  _pr = requestAnimationFrame(function(){
    _pr=null;
    var w=window.innerWidth, h=window.innerHeight, mob=w<=700;
    var aw=mob?w-24:w-24-12-250, ah=mob?h*.65:h-20-90;
    var sz=Math.max(280,Math.min(960,aw,ah));
    var sn=Math.floor(sz/8)*8;
    document.documentElement.style.setProperty("--board-size",sn+"px");
    if(sn!==_ls){_ls=sn; if(window._boardReady) recreateBoard(sn);}
  });
}

// ── Board ────────────────────────────────────────────────────────
var board=null;
// These are set by the module script below
var _COLOR, _IET, _BT, _MT;

function recreateBoard(size) {
  if(!window._boardReady||!window._Chessboard) return;
  var el=document.getElementById("board-container");
  if(board){try{board.destroy()}catch(e){} board=null; el.innerHTML="";}
  el.style.width=size+"px"; el.style.height=size+"px";
  board=new window._Chessboard(el,{
    position:S.fen||INIT_FEN,
    orientation:S.playerColor==="black"?_COLOR.black:_COLOR.white,
    assetsUrl:"https://unpkg.com/cm-chessboard@8/assets/",
    style:{cssClass:"default",borderType:_BT.frame,showCoordinates:true,
           pieces:{file:"pieces/staunty.svg"},animationDuration:200},
    extensions:[{class:window._Markers},{class:window._PromotionDialog}]
  });
  board.enableMoveInput(handleMoveInput);
}

// ── Move input ───────────────────────────────────────────────────
function handleMoveInput(event) {
  if(event.type===_IET.moveInputStarted){
    if((chessEngine.turn()==="w"?"white":"black")!==S.playerColor) return false;
    var legal=chessEngine.moves({square:event.squareFrom,verbose:true}).map(function(m){return m.to;});
    if(!legal.length) return false;
    try{board.removeMarkers(_MT.dot);}catch(e){}
    legal.forEach(function(sq){try{board.addMarker(_MT.dot,sq);}catch(e){}});
    return true;
  }
  if(event.type===_IET.validateMoveInput){
    try{board.removeMarkers(_MT.dot);}catch(e){}
    var from=event.squareFrom, to=event.squareTo, prev=S.fen;
    S.busy=true;
    var isPromo=chessEngine.moves({square:from,verbose:true}).some(function(m){return m.to===to&&m.promotion;});
    if(isPromo){
      board.showPromotionDialog(to,S.playerColor==="white"?_COLOR.white:_COLOR.black,function(res){
        var p=res?res.piece[1].toUpperCase():"";
        if(!p){board.setPosition(prev,false);S.busy=false;return;}
        doValidate(from,to,p,prev);
      });
    } else { doValidate(from,to,"",prev); }
    return true;
  }
  if(event.type===_IET.moveInputCanceled){try{board.removeMarkers(_MT.dot);}catch(e){}}
  return true;
}

function doValidate(from,to,promo,prevFen){
  var exp=S.moves[S.moveIdx];
  var ok=exp&&from===exp.from&&to===exp.to&&(!exp.promo||promo===exp.promo);
  if(ok){
    chessEngine.move({from:from,to:to,promotion:promo.toLowerCase()||undefined});
    S.fen=chessEngine.fen(); S.moveIdx++;
    document.getElementById("sc-c").textContent=++S.scoreC;
    updateAccuracy(); playSound("move");
    setCard("correct","✓","Correct!"); showAnnotation(exp.comment,"You");
    board.setPosition(S.fen,true); updateProgress(); updateMovelist();
    S.busy=false;
    if(S.moveIdx>=S.moves.length){finishLine();return;}
    setTimeout(function(){setCard("idle","♟","Your turn");runOpponent();},500);
  } else {
    board.setPosition(prevFen,false);
    document.getElementById("sc-w").textContent=++S.scoreW;
    updateAccuracy(); playSound("wrong");
    setCard("wrong","✗","Wrong — try again!");
    setTimeout(function(){setCard("idle","♟","Your turn");S.busy=false;},1400);
  }
}

function runOpponent(){
  if(!board||S.moveIdx>=S.moves.length||S.busy) return;
  if((chessEngine.turn()==="w"?"white":"black")===S.playerColor) return;
  S.busy=true; setCard("think","…","Thinking…");
  setTimeout(function(){
    var m=S.moves[S.moveIdx];
    chessEngine.move({from:m.from,to:m.to,promotion:m.promo.toLowerCase()||undefined});
    S.fen=chessEngine.fen(); S.moveIdx++;
    playSound("move"); showAnnotation(m.comment,"Book");
    board.setPosition(S.fen,true); updateProgress(); updateMovelist();
    S.busy=false;
    if(S.moveIdx>=S.moves.length){finishLine();return;}
    if((chessEngine.turn()==="w"?"white":"black")!==S.playerColor) setTimeout(runOpponent,350);
    else setCard("idle","♟","Your turn");
  },380);
}

// ── Game selection ───────────────────────────────────────────────
function selectGame(idx){
  S.gameIdx=idx; var game=S.games[idx];
  S.moves=game.moves; S.moveIdx=0;
  chessEngine=newChess(); S.fen=chessEngine.fen(); S.busy=false;
  document.getElementById("welcome").style.display="none";
  document.getElementById("trainer").style.display="flex";
  // If board not ready yet, it will be initialised by the module script
  if(!board) { window._pendingGame=idx; return; }
  board.setOrientation(S.playerColor==="white"?_COLOR.white:_COLOR.black);
  board.setPosition(S.fen,false);
  try{board.removeMarkers(_MT.dot);}catch(e){}
  board.disableMoveInput(); board.enableMoveInput(handleMoveInput);
  updateStrip(); updateProgress(); updateMovelist(); showAnnotation("");
  var d=S.mode==="drill";
  document.getElementById("btn-prev").style.display=d?"none":"";
  document.getElementById("btn-next").style.display=d?"none":"";
  document.getElementById("btn-next-done-wrap").style.display="none";
  document.getElementById("btn-hint").disabled=false;
  document.getElementById("btn-skip").disabled=false;
  if(d) setCard("drill","🎯","Line "+(S.drillDone.size+1)+" of "+S.games.length);
  else  setCard("idle","♟","Your turn");
  if(S.playerColor==="black") setTimeout(runOpponent,400);
}

function setMode(mode){
  S.mode=mode;
  document.getElementById("mbtn-practice").className="mbtn"+(mode==="practice"?" active-practice":"");
  document.getElementById("mbtn-drill").className   ="mbtn"+(mode==="drill"   ?" active-drill"   :"");
  if(mode==="drill") drillReset();
  else document.getElementById("drill-footer").classList.remove("show");
  if(S.gameIdx>=0) selectGame(S.gameIdx);
}

function drillReset(){
  var a=[]; for(var i=0;i<S.games.length;i++) a.push(i);
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  S.drillQueue=a; S.drillDone=new Set(); updateDrillFooter();
}
function updateDrillFooter(){
  var f=document.getElementById("drill-footer");
  if(S.mode!=="drill"||!S.games.length){f.classList.remove("show");return;}
  f.classList.add("show");
  document.getElementById("drill-footer-txt").textContent=
    S.drillDone.size===S.games.length?"🏆 All "+S.games.length+" lines drilled!":
    "🎯 "+S.drillDone.size+" / "+S.games.length+" done";
}
function setColor(c){
  S.playerColor=c;
  document.getElementById("cbtn-w").className="cbtn"+(c==="white"?" sw":"");
  document.getElementById("cbtn-b").className="cbtn"+(c==="black"?" sb":"");
  if(S.gameIdx>=0) selectGame(S.gameIdx);
}
function updateStrip(){
  if(!board) return;
  var wK="data:image/svg+xml;utf8,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22.5 11.63V6M20 8h5" stroke-linejoin="miter"/><path d="M22.5 25s4.5-7.5 3-10.5c0 0-1-2.5-3-2.5s-3 2.5-3 2.5c-1.5 3 3 10.5 3 10.5" fill="#fff" stroke-linecap="butt"/><path d="M11.5 37c5.5 3.5 15.5 3.5 21 0v-7s9-4.5 6-10.5c-4-6.5-13.5-3.5-16 4V17s-5.5-3.5-10.5 0c-3 3.5-4.5 8 0 12l.5 8z" fill="#fff"/><path d="M11.5 30c5.5-3 15.5-3 21 0m-21 3.5c5.5-3 15.5-3 21 0m-21 3.5c5.5-3 15.5-3 21 0"/></g></svg>');
  var bK="data:image/svg+xml;utf8,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22.5 11.63V6M20 8h5" stroke-linejoin="miter"/><path d="M22.5 25s4.5-7.5 3-10.5c0 0-1-2.5-3-2.5s-3 2.5-3 2.5c-1.5 3 3 10.5 3 10.5" fill="#1a1a1a" stroke-linecap="butt"/><path d="M11.5 37c5.5 3.5 15.5 3.5 21 0v-7s9-4.5 6-10.5c-4-6.5-13.5-3.5-16 4V17s-5.5-3.5-10.5 0c-3 3.5-4.5 8 0 12l.5 8z" fill="#1a1a1a"/><path d="M11.5 30c5.5-3 15.5-3 21 0m-21 3.5c5.5-3 15.5-3 21 0m-21 3.5c5.5-3 15.5-3 21 0" stroke="#fff"/></g></svg>');
  var fl=board.getOrientation()===_COLOR.black;
  var col=fl?(S.playerColor==="white"?"black":"white"):S.playerColor;
  document.getElementById("bot-ico").innerHTML='<img src="'+(col==="white"?wK:bK)+'">';
  document.getElementById("bot-name").textContent="You";
  var t=document.getElementById("bot-tag");
  t.textContent=S.mode==="drill"?"Drill":"Player";
  t.className="ps-tag "+(S.mode==="drill"?"tag-drill":"tag-you");
}
function showHint(){
  if(S.moveIdx>=S.moves.length||S.busy) return;
  var m=S.moves[S.moveIdx]; if(!m) return;
  try{board.removeMarkers(_MT.dot);board.removeMarkers(_MT.frame);}catch(e){}
  try{board.addMarker(_MT.frame,m.from);board.addMarker(_MT.frame,m.to);}catch(e){}
  setCard("idle","💡","Hint: "+m.san);
}
function doSkip(){
  if(S.moveIdx>=S.moves.length||S.busy) return;
  S.busy=true;
  try{board.removeMarkers(_MT.dot);}catch(e){}
  var m=S.moves[S.moveIdx];
  chessEngine.move({from:m.from,to:m.to,promotion:m.promo.toLowerCase()||undefined});
  S.fen=chessEngine.fen(); S.moveIdx++;
  playSound("move"); showAnnotation(m.comment,"Book");
  board.setPosition(S.fen,true); updateProgress(); updateMovelist();
  S.busy=false;
  if(S.moveIdx>=S.moves.length){finishLine();return;}
  if((chessEngine.turn()==="w"?"white":"black")!==S.playerColor) setTimeout(runOpponent,350);
  else setCard("idle","♟","Your turn");
}
function restartLine(){if(S.gameIdx>=0) selectGame(S.gameIdx);}
function prevLine(){if(S.gameIdx>0) selectGame(S.gameIdx-1);}
function nextLine(){if(S.gameIdx<S.games.length-1) selectGame(S.gameIdx+1);}
function nextAfterDone(){nextLine();}
function flipBoard(){
  if(!board) return;
  board.setOrientation(board.getOrientation()===_COLOR.white?_COLOR.black:_COLOR.white);
  updateStrip();
}
function finishLine(){
  playSound("done");
  if(board) board.disableMoveInput();
  document.getElementById("btn-hint").disabled=true;
  document.getElementById("btn-skip").disabled=true;
  if(S.mode==="drill"){
    S.drillDone.add(S.gameIdx); updateDrillFooter();
    if(S.drillQueue.length>0){
      setCard("done","★","Line done! Moving to next…");
      var nx=S.drillQueue.shift();
      setTimeout(function(){selectGame(nx);},1200);
    } else setCard("done","🏆","All lines drilled!");
  } else {
    S.completed.add(S.gameIdx);
    setCard("done","★","Line complete!");
    document.getElementById("btn-next-done-wrap").style.display="block";
  }
}
function setCard(state,icon,msg){
  document.getElementById("bot-strip").className="pstrip s-"+state;
  document.getElementById("status-icon").textContent=icon;
  document.getElementById("status-msg").textContent=msg;
}
function showAnnotation(text,who){
  var p=document.getElementById("annotation");
  if(text&&text.trim()){
    document.getElementById("annotation-label").textContent=who==="You"?"Your move":"Book note";
    document.getElementById("annotation-icon").textContent=who==="You"?"💡":"📖";
    document.getElementById("annotation-text").textContent=text;
    p.classList.add("show");
  } else { p.classList.remove("show"); }
}
function updateAccuracy(){
  var t=S.scoreC+S.scoreW;
  document.getElementById("sc-pct").textContent=t>0?Math.round(S.scoreC/t*100)+"%":"—";
}
function updateProgress(){
  var t=S.moves.length, d=Math.min(S.moveIdx,t);
  document.getElementById("prog-fill").style.width=(t>0?Math.round(d/t*100):0)+"%";
  document.getElementById("prog-txt").textContent=d+" / "+t;
}
function updateMovelist(){
  var el=document.getElementById("movelist");
  el.innerHTML=S.moves.map(function(m,i){
    var n=i%2===0?'<span class="ml-n">'+(Math.floor(i/2)+1)+'.</span>':"";
    var c=["ml-m",i<S.moveIdx?"done":"",i===S.moveIdx-1?"current":"",m.comment?"annotated":""].filter(Boolean).join(" ");
    return n+'<span class="'+c+'">'+m.san+'</span> ';
  }).join("");
  var cur=el.querySelector(".current");
  if(cur) cur.scrollIntoView({block:"nearest"});
}
document.addEventListener("keydown",function(e){
  if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT") return;
  if(e.key==="h"||e.key==="H") showHint();
  if(e.key==="s"||e.key==="S") doSkip();
  if(e.key==="r"||e.key==="R") restartLine();
  if(e.key==="ArrowRight"&&S.mode==="practice") nextLine();
  if(e.key==="ArrowLeft" &&S.mode==="practice") prevLine();
  if(e.key==="f"||e.key==="F") flipBoard();
  if(e.key==="d"||e.key==="D") setMode(S.mode==="drill"?"practice":"drill");
});
new ResizeObserver(applyBoardSize).observe(document.getElementById("app"));
window.addEventListener("resize",applyBoardSize);
</script>

<!-- cm-chessboard needs ES module — runs after plain script, exposes globals -->
<script type="module">
import { Chessboard, COLOR, INPUT_EVENT_TYPE, BORDER_TYPE }
  from "https://unpkg.com/cm-chessboard@8/src/Chessboard.js";
import { Markers, MARKER_TYPE }
  from "https://unpkg.com/cm-chessboard@8/src/extensions/markers/Markers.js";
import { PromotionDialog }
  from "https://unpkg.com/cm-chessboard@8/src/extensions/promotion-dialog/PromotionDialog.js";

window._Chessboard = Chessboard;
window._Markers = Markers;
window._PromotionDialog = PromotionDialog;
_COLOR = window._COLOR = COLOR;
_IET   = window._IET   = INPUT_EVENT_TYPE;
_BT    = window._BT    = BORDER_TYPE;
_MT    = window._MT    = MARKER_TYPE;
window._boardReady = true;
applyBoardSize();
// If a game was selected before board was ready, finish setting it up
if (window._pendingGame !== undefined) {
  var idx = window._pendingGame;
  window._pendingGame = undefined;
  // Board now exists after applyBoardSize — finish selectGame
  setTimeout(function() {
    board.setOrientation(S.playerColor==="white"?_COLOR.white:_COLOR.black);
    board.setPosition(S.fen, false);
    try{board.removeMarkers(_MT.dot);}catch(e){}
    board.disableMoveInput(); board.enableMoveInput(handleMoveInput);
    updateStrip(); updateProgress(); updateMovelist(); showAnnotation("");
    var d=S.mode==="drill";
    document.getElementById("btn-prev").style.display=d?"none":"";
    document.getElementById("btn-next").style.display=d?"none":"";
    document.getElementById("btn-next-done-wrap").style.display="none";
    document.getElementById("btn-hint").disabled=false;
    document.getElementById("btn-skip").disabled=false;
    if(d) setCard("drill","🎯","Line "+(S.drillDone.size+1)+" of "+S.games.length);
    else  setCard("idle","♟","Your turn");
    if(S.playerColor==="black") setTimeout(runOpponent,400);
  }, 50);
}
if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
