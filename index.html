<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chess Repertoire Trainer</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#13141b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8.7.8/assets/chessboard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8.7.8/assets/extensions/markers/markers.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8.7.8/assets/extensions/promotion-dialog/promotion-dialog.css">

<script type="importmap">
{
  "imports": {
    "chess.js": "https://cdn.jsdelivr.net/npm/chess.js@1.3.0/+esm",
    "cm-chessboard/": "https://cdn.jsdelivr.net/npm/cm-chessboard@8.7.8/src/"
  }
}
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg2:#13141b;--panel:#21232e;--panel2:#2a2d3a;
  --border:#2e3145;--border2:#393d54;
  --text:#d0d2de;--text2:#f0f1f8;--dim:#585c76;
  --green:#5f9e43;--green-lt:#72bf50;--green-bg:rgba(95,158,67,.18);
  --red:#c0392b;--red-lt:#e05040;--red-bg:rgba(192,57,43,.18);
  --blue:#4a8fd4;--gold:#d4a017;--gold-bg:rgba(212,160,23,.18);--gold-lt:#f0c040;
  --white-rep:rgba(220,200,140,.12);--white-rep-border:rgba(220,200,140,.35);
  --black-rep:rgba(80,80,100,.25);--black-rep-border:rgba(120,120,160,.4);
}
html,body{height:100%;width:100%;background:var(--bg2);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:14px;overflow:hidden;user-select:none}
#app{display:flex;height:100vh;padding:10px 12px;gap:12px;align-items:stretch}
#sidebar{width:250px;flex-shrink:0;order:2}
#sidebar-card{width:100%;height:100%;background:var(--panel);border-radius:14px;
  border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.6);
  display:flex;flex-direction:column;overflow:hidden}

/* ── HOME panel ── */
#sb-home{display:flex;flex-direction:column;height:100%;overflow:hidden}
.sb-logo{padding:10px 14px 9px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo-icon{width:30px;height:30px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo-name{font-size:14px;font-weight:800;color:var(--text2)}.sb-logo-sub{font-size:10px;color:var(--dim)}
.sb-hdr{padding:5px 12px 3px;font-size:10px;font-weight:700;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--dim);background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
#rep-home-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px;overflow-y:auto}
.rep-home-btn{padding:10px 8px;border-radius:10px;border:2px solid var(--border2);
  background:var(--panel2);color:var(--text);cursor:pointer;font-size:12px;font-weight:700;
  text-align:center;display:flex;flex-direction:column;gap:3px;min-height:52px;
  align-items:center;justify-content:center;transition:border-color .15s,background .15s}
.rep-home-btn:hover{border-color:var(--blue);background:rgba(74,143,212,.08)}
.rep-home-btn.color-white{border-color:var(--white-rep-border);background:var(--white-rep)}
.rep-home-btn.color-white:hover{border-color:rgba(220,200,140,.7)}
.rep-home-btn.color-black{border-color:var(--black-rep-border);background:var(--black-rep)}
.rep-home-btn.color-black:hover{border-color:rgba(150,150,190,.7)}
.rep-home-btn.empty{opacity:.35;cursor:default;border-style:dashed}
.rep-home-btn.empty:hover{border-color:var(--border2);background:var(--panel2)}
.rep-home-name{font-size:13px;font-weight:800;color:var(--text2)}
.rep-home-desc{font-size:9px;color:var(--dim);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.rep-home-tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:1px}
.tag-w{background:rgba(220,200,140,.2);color:#d4c47a;border:1px solid rgba(220,200,140,.3)}
.tag-b{background:rgba(100,100,140,.3);color:#9898c8;border:1px solid rgba(120,120,170,.4)}
.tag-drill{background:var(--gold-bg);color:var(--gold-lt);border:1px solid rgba(212,160,23,.35)}
.tag-practice{background:var(--green-bg);color:var(--green-lt);border:1px solid rgba(95,158,67,.35)}

/* ── PARAMS panel ── */
#sb-params{display:none;flex-direction:column;height:100%;overflow:hidden}
#sb-params-topbar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
#sb-params-back{padding:4px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--panel2);color:var(--dim);cursor:pointer;font-size:13px;font-weight:700;flex-shrink:0;line-height:1}
#sb-params-back:hover{border-color:var(--text);color:var(--text)}
#sb-params-title{flex:1;font-size:13px;font-weight:800;color:var(--text2)}
#sb-params-save,#sb-params-play{padding:4px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--panel2);color:var(--dim);cursor:pointer;font-size:13px;font-weight:700;flex-shrink:0}
#sb-params-play{border-color:var(--green);background:var(--green-bg);color:var(--green-lt)}
#sb-params-play:disabled{opacity:.35;pointer-events:none}
#sb-params-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:10px}
.param-row{display:flex;flex-direction:column;gap:4px}
.param-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
.param-input{width:100%;padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-size:12px;font-weight:600;outline:none}
.param-input:focus{border-color:var(--blue)}
.param-btns{display:flex;gap:5px}
.param-btn{flex:1;padding:5px 6px;border-radius:7px;border:2px solid var(--border2);background:var(--panel2);
  color:var(--dim);cursor:pointer;font-size:11px;font-weight:700;text-align:center}
.param-btn.active-w{border-color:rgba(220,200,140,.7);color:#d4c47a;background:var(--white-rep)}
.param-btn.active-b{border-color:rgba(120,120,170,.6);color:#9898c8;background:var(--black-rep)}
.param-btn.active-drill{border-color:var(--gold);color:var(--gold-lt);background:var(--gold-bg)}
.param-btn.active-practice{border-color:var(--green);color:var(--green-lt);background:var(--green-bg)}
#sb-params-footer{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.load-status{font-size:10px;color:var(--dim);min-height:14px}
.load-status.ok{color:var(--green-lt)}
.load-status.err{color:var(--red-lt)}
.load-btn{display:block;width:100%;padding:7px;border-radius:8px;border:1px solid var(--border2);
  background:var(--panel2);color:var(--text);cursor:pointer;font-size:11px;font-weight:700;
  text-align:center;transition:border-color .15s}
.load-btn:hover{border-color:var(--blue);color:var(--blue)}
.pgn-paste{width:100%;height:64px;background:var(--bg2);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-size:10px;font-family:monospace;padding:6px 8px;
  resize:none;outline:none;user-select:text}
.pgn-paste:focus{border-color:var(--green)}
.load-sub-btn{width:100%;padding:6px;border-radius:7px;border:1px solid var(--border2);
  background:var(--panel2);color:var(--dim);cursor:pointer;font-size:11px;font-weight:600}
.load-sub-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── ACTIVE panel ── */
#sb-active{display:none;flex-direction:column;height:100%;overflow:hidden}
#sb-active-topbar{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
#sb-active-back{padding:4px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--panel2);color:var(--dim);cursor:pointer;font-size:13px;font-weight:700;flex-shrink:0;line-height:1}
#sb-active-back:hover{border-color:var(--text);color:var(--text)}
#sb-active-repname{flex:1;font-size:13px;font-weight:800;color:var(--text2)}
.sb-scores{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sbs{flex:1;padding:6px 8px;text-align:center;border-right:1px solid var(--border)}
.sbs:last-child{border-right:none}.sbs .v{display:block;font-size:18px;font-weight:800;line-height:1.1}
.sbs .l{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--dim)}
.sbs.c .v{color:var(--green-lt)}.sbs.w .v{color:var(--red-lt)}
#sb-active-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}
#prog-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#prog-track{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
#prog-fill{height:100%;background:var(--green-lt);border-radius:3px;transition:width .3s}
#prog-txt{font-size:10px;color:var(--dim);width:40px;text-align:right;flex-shrink:0}
#movelist-row{padding:8px 12px 6px}
#movelist-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
#movelist{display:flex;flex-wrap:wrap;gap:1px 2px;font-size:11px;font-family:monospace}
.ml-n{color:var(--dim);padding:1px 2px}.ml-m{padding:1px 4px;border-radius:3px;color:#383d56}
.ml-m.done{color:var(--text)}.ml-m.current{background:var(--green-bg);color:var(--green-lt);font-weight:700}
.ml-m.annotated{position:relative;padding-right:9px}
.ml-m.annotated::after{content:"";position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;background:var(--blue)}

/* ── Main area ── */
#main{flex:1;min-width:0;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;order:1;overflow:hidden}
#welcome{text-align:center;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:12px}
.w-icon{font-size:56px}#welcome h2{font-size:22px;font-weight:800;color:var(--text2)}
#trainer{display:none;flex-direction:column;align-items:center;gap:6px;width:100%;height:100%;overflow:hidden;justify-content:center}
#bot-strip,#ctrl-row{width:var(--board-size,560px)}
#board-container{flex-shrink:0;box-shadow:0 4px 8px rgba(0,0,0,.45),0 14px 44px rgba(0,0,0,.68);border-radius:4px;overflow:hidden}
.cm-chessboard{--color-move-from-marker:rgba(255,210,0,.7);--color-move-to-marker:rgba(255,210,0,.7);--color-input-marker:rgba(255,210,0,.5)}
.cm-chessboard .marker-dot circle{fill:rgba(0,0,0,.4)!important}
.cm-chessboard .marker-frame rect,.cm-chessboard .marker-frame circle{fill:none!important;stroke:rgba(255,210,0,.8)!important;stroke-width:3px!important}
.cm-chessboard .board .square.white{fill:#f0d9b5!important}.cm-chessboard .board .square.black{fill:#b58863!important}
.cm-chessboard.border-type-frame .board .border{fill:#2a2d3a!important}
.cm-chessboard.border-type-frame .board .border-inner{fill:#1a1c24!important;stroke:#3d4152!important}
.cm-chessboard .coordinates .coordinate{fill:#6b6f82!important;font-size:11px}

/* ── Status bar ── */
#mobile-exit-btn{display:none;padding:4px 10px;border-radius:6px;border:1px solid var(--border2);
  background:var(--panel2);color:var(--dim);cursor:pointer;font-size:11px;font-weight:700;
  align-self:flex-start;flex-shrink:0}border-radius:10px;
  padding:6px 10px;border:1px solid var(--border2);flex-shrink:0;min-height:36px}
#bot-strip.s-correct{border-color:var(--green);background:var(--green-bg)}
#bot-strip.s-wrong{border-color:var(--red);background:var(--red-bg)}
#bot-strip.s-done{border-color:var(--green);background:var(--green-bg)}
#bot-strip.s-think{background:rgba(74,143,212,.08)}
#status-left{flex:1;display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden}
#status-line-num{font-size:11px;font-weight:800;color:var(--dim);white-space:nowrap;flex-shrink:0}
#status-annotation{font-size:11px;color:var(--text2);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#status-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
#status-score{font-size:11px;font-weight:700;color:var(--text2);white-space:nowrap}
#status-prog-wrap{width:60px;height:4px;background:var(--bg2);border-radius:3px;overflow:hidden;flex-shrink:0}
#status-prog-fill{height:100%;background:var(--green-lt);border-radius:3px;transition:width .3s;width:0%}
.ctrl-btn{padding:3px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--panel2);
  color:var(--text);cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0}
.ctrl-btn:hover{border-color:var(--blue);color:var(--blue)}
.ctrl-btn:disabled{opacity:.3;pointer-events:none}
.ctrl-btn.g{border-color:var(--green);color:var(--green-lt);background:var(--green-bg)}

/* ── Drill end modal ── */
#drill-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:3000;align-items:center;justify-content:center}
#drill-modal-overlay.open{display:flex}
#drill-modal{background:var(--panel);border:1px solid var(--border2);border-radius:14px;
  width:min(340px,92vw);padding:24px;display:flex;flex-direction:column;gap:16px;
  box-shadow:0 16px 48px rgba(0,0,0,.7);text-align:center}
#drill-modal h3{font-size:16px;font-weight:800;color:var(--text2)}
#drill-modal p{font-size:12px;color:var(--dim);line-height:1.6}
#drill-modal-btns{display:flex;gap:8px}
.dm-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border2);
  background:var(--panel2);color:var(--text);cursor:pointer;font-size:12px;font-weight:700}
.dm-btn.g{border-color:var(--gold);color:var(--gold-lt);background:var(--gold-bg)}
.dm-btn.r{border-color:var(--green);color:var(--green-lt);background:var(--green-bg)}

/* ── Mobile: portrait ── */
@media(max-width:700px) and (orientation:portrait){
  #app{flex-direction:column;padding:0;gap:0;height:100vh;overflow:hidden}
  #sidebar{width:100%;flex-shrink:0;order:1;height:auto}
  #sidebar-card{border-radius:0;border-left:none;border-right:none;border-top:none;height:auto;max-height:100vh}
  #sb-home{height:auto}
  #rep-home-grid{grid-template-columns:repeat(4,1fr);gap:4px;padding:8px}
  .rep-home-btn{padding:8px 4px;border-radius:8px;min-height:36px}
  .rep-home-name{font-size:11px}
  #home-load-section .sb-hdr{display:none}
  #home-load-section > div{padding:6px 8px;gap:4px}
  .pgn-paste{height:44px}
  #main{order:2;flex:1;min-height:0;width:100%;overflow:hidden}
  #trainer{height:100%;justify-content:center;gap:4px;padding:4px}
  #board-container{flex-shrink:0!important}
  #bot-strip{width:100%!important;flex-shrink:0!important}
  /* Hide sidebar when training is active */
  body.training #sidebar{display:none}
  body.training #main{order:1;height:100%}
  body.training #mobile-exit-btn{display:block}
  html,body{overflow:hidden}
}
/* ── Mobile: landscape ── */
@media(max-width:900px) and (orientation:landscape){
  #app{flex-direction:row;padding:4px;gap:4px;height:100vh}
  #sidebar{width:160px;flex-shrink:0;order:2}
  #sidebar-card{border-radius:10px}
  #rep-home-grid{grid-template-columns:repeat(2,1fr);gap:4px;padding:6px 8px}
  .rep-home-btn{padding:6px 4px;border-radius:7px;min-height:30px}
  .rep-home-name{font-size:10px}
  #home-load-section .sb-hdr{font-size:9px}
  .pgn-paste{height:44px}
  .load-btn{padding:5px;font-size:10px}
  .load-sub-btn{padding:4px;font-size:10px}
  #main{flex:1;min-width:0;order:1}
  #trainer{gap:4px;padding:4px 0}
  #board-container{flex-shrink:0!important}
  #bot-strip{width:var(--board-size,400px)!important;flex-shrink:0!important}
  #mobile-exit-btn{display:none!important} /* sidebar visible in landscape, use its back btn */
  html,body{overflow:hidden}
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar"><div id="sidebar-card">

    <!-- HOME: just the 8 rep buttons -->
    <div id="sb-home">
      <div class="sb-logo">
        <div class="sb-logo-icon">♟</div>
        <div><div class="sb-logo-name">Repertoire</div><div class="sb-logo-sub">Trainer</div></div>
      </div>
      <div id="rep-home-grid"></div>
      <div id="home-load-section">
        <div class="sb-hdr">Load PGN</div>
        <div style="padding:8px 12px;display:flex;flex-direction:column;gap:6px">
          <input type="file" id="home-file-input" accept=".pgn,.txt" style="position:absolute;opacity:0;width:0;height:0">
          <label for="home-file-input" class="load-btn">📂 Open file</label>
          <textarea class="pgn-paste" id="home-paste-area" placeholder="…or paste PGN here" spellcheck="false"></textarea>
          <button class="load-sub-btn" onclick="homeLoadFromPaste()">↳ Load pasted text</button>
          <div id="home-load-status" class="load-status"></div>
        </div>
      </div>
    </div>

    <!-- PARAMS: settings for selected rep -->
    <div id="sb-params">
      <div id="sb-params-topbar">
        <button id="sb-params-back" onclick="goHome()">←</button>
        <span id="sb-params-title">—</span>
        <button id="sb-params-save" onclick="saveParamsAndGoHome()" title="Save and return">💾</button>
        <button id="sb-params-play" onclick="startRep()" disabled title="Start session">▶</button>
      </div>
      <div id="sb-params-body">
        <div class="param-row">
          <div class="param-lbl">Name</div>
          <input class="param-input" id="param-name" type="text" maxlength="8" spellcheck="false" oninput="saveParam('name',this.value)">
        </div>
        <div class="param-row">
          <div class="param-lbl">Description</div>
          <input class="param-input" id="param-desc" type="text" maxlength="40" spellcheck="false" oninput="saveParam('desc',this.value)">
        </div>
        <div class="param-row">
          <div class="param-lbl">Play as</div>
          <div class="param-btns">
            <button class="param-btn" id="pbtn-w" onclick="saveParam('color','white')">♔ White</button>
            <button class="param-btn" id="pbtn-b" onclick="saveParam('color','black')">♚ Black</button>
          </div>
        </div>
        <div class="param-row">
          <div class="param-lbl">Mode</div>
          <div class="param-btns">
            <button class="param-btn" id="pbtn-practice" onclick="saveParam('drill',false)">📖 Practice</button>
            <button class="param-btn" id="pbtn-drill" onclick="saveParam('drill',true)">🎯 Drill</button>
          </div>
        </div>
      </div>
      <div id="sb-params-footer">
        <div class="param-lbl" style="padding:0 0 4px">Import PGN</div>
        <input type="file" id="import-file-input" accept=".pgn,.txt" style="position:absolute;opacity:0;width:0;height:0">
        <label for="import-file-input" class="load-btn">📂 Open file</label>
        <textarea class="pgn-paste" id="params-paste-area" placeholder="…or paste PGN here" spellcheck="false"></textarea>
        <button class="load-sub-btn" onclick="paramsLoadFromPaste()">↳ Load pasted text</button>
        <div id="import-status" class="load-status"></div>
      </div>
    </div>

    <!-- ACTIVE: live training view -->
    <div id="sb-active">
      <div id="sb-active-topbar">
        <button id="sb-active-back" onclick="goParams()">←</button>
        <span id="sb-active-repname">—</span>
      </div>
      <div class="sb-scores">
        <div class="sbs c"><span class="v" id="sc-clean">0</span><span class="l">Clean</span></div>
        <div class="sbs w"><span class="v" id="sc-err">0</span><span class="l">Errors</span></div>
        <div class="sbs"><span class="v" id="sc-pct" style="color:var(--text)">—</span><span class="l">Accuracy</span></div>
      </div>
      <div id="sb-active-body">
        <div id="prog-row">
          <div id="prog-track"><div id="prog-fill" style="width:0%"></div></div>
          <div id="prog-txt">0 / 0</div>
        </div>
        <div id="movelist-row">
          <div id="movelist-lbl">Moves</div>
          <div id="movelist"></div>
        </div>
      </div>
    </div>

  </div></div>

  <div id="main">
    <div id="welcome">
      <div class="w-icon">♟</div>
      <h2>Repertoire Trainer</h2>
      <p style="color:var(--dim);font-size:13px">Select a repertoire to begin</p>
    </div>
    <div id="trainer" style="display:none">
      <div id="mobile-exit-btn" onclick="goHome()">← Exit</div>
      <div id="board-container"></div>
      <div id="bot-strip">
        <div id="status-left">

// ── Board library globals ─────────────────────────────────────────
var _COLOR, _IET, _BT, _MT;
var board = null;
var chessEngine = null;

// ── Board sizing ─────────────────────────────────────────────────
var _pr=null, _ls=0;
function applyBoardSize() {
  if(_pr) cancelAnimationFrame(_pr);
  _pr = requestAnimationFrame(function(){
    _pr=null;
    var w=window.innerWidth, h=window.innerHeight;
    var portrait = w<=700 && h>w;
    var landscape = w<=900 && h<=w;
    var aw, ah;
    if (portrait) {
      // Full width, board gets lower half of screen
      aw = w - 16;
      ah = h * 0.52;
    } else if (landscape) {
      // Sidebar 160px on right
      aw = w - 160 - 20;
      ah = h - 60;
    } else {
      // Desktop: sidebar 250px
      aw = w - 250 - 24 - 12;
      ah = h - 20 - 90;
    }
    var sz=Math.max(200,Math.min(960,aw,ah));
    var sn=Math.floor(sz/8)*8;
    document.documentElement.style.setProperty("--board-size",sn+"px");
    if(sn!==_ls){_ls=sn; if(window._boardReady) recreateBoard(sn);}
  });
}


function recreateBoard(size) {
  if(!window._boardReady||!window._Chessboard) return;
  var el=document.getElementById("board-container");
  if(board){try{board.destroy()}catch(e){} board=null; el.innerHTML="";}
  el.style.width=size+"px"; el.style.height=size+"px";
  board=new window._Chessboard(el,{
    position:S.fen||(window._FEN?window._FEN.start:"start"),
    orientation:S.playerColor==="black"?_COLOR.black:_COLOR.white,
    assetsUrl:"https://cdn.jsdelivr.net/npm/cm-chessboard@8.7.8/assets/",
    style:{cssClass:"default",borderType:_BT.frame,showCoordinates:true,
           pieces:{file:"pieces/staunty.svg"},animationDuration:200},
    extensions:[{class:window._Markers},{class:window._PromotionDialog}]
  });
  board.enableMoveInput(handleMoveInput);
}

// ── Move input ───────────────────────────────────────────────────
function handleMoveInput(event) {
  if(event.type===_IET.moveInputStarted){
    if((chessEngine.turn()==="w"?"white":"black")!==S.playerColor) return false;
    var legal=chessEngine.moves({square:event.squareFrom,verbose:true}).map(function(m){return m.to;});
    if(!legal.length) return false;
    try{board.removeMarkers(_MT.dot);}catch(e){}
    legal.forEach(function(sq){try{board.addMarker(_MT.dot,sq);}catch(e){}});
    return true;
  }
  if(event.type===_IET.validateMoveInput){
    try{board.removeMarkers(_MT.dot);}catch(e){}
    var from=event.squareFrom, to=event.squareTo, prev=S.fen;
    S.busy=true;
    var isPromo=chessEngine.moves({square:from,verbose:true}).some(function(m){return m.to===to&&m.promotion;});
    if(isPromo){
      board.showPromotionDialog(to,S.playerColor==="white"?_COLOR.white:_COLOR.black,function(res){
        var p=res?res.piece[1].toUpperCase():"";
        if(!p){board.setPosition(prev,false);S.busy=false;return;}
        doValidate(from,to,p,prev);
      });
    } else { doValidate(from,to,"",prev); }
    return true;
  }
  if(event.type===_IET.moveInputCanceled){try{board.removeMarkers(_MT.dot);}catch(e){}}
  return true;
}

function parsePgn(text) {
  text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  text = text.replace(/[!?]+/g, "");

  var games = [];

  // ── Format 1: custom # header format ──────────────────────────
  if (text.trim().startsWith("#")) {
    var lines = text.split("\n");
    var sectionTitle = "";
    var currentName = "";
    var currentMoves = [];

    function flushLine() {
      if (currentName && currentMoves.length) {
        var moveText = currentMoves.join(" ").trim();
        var g = parseMoveText(moveText, currentName);
        if (g && g.moves.length) games.push(g);
      }
      currentName = ""; currentMoves = [];
    }

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;

      if (line.startsWith("#")) {
        // Strip leading # chars and digits to get the label
        var label = line.replace(/^[# 	]+/, "").replace(/^\d+[. 	]*/, "").trim();
        // Does it contain move notation? (has digits followed by dot)
        var hasMoves = /\d+\./.test(label);

        if (hasMoves) {
          // inline: "#1 1. e4 e5" — flush previous, parse moves from label
          flushLine();
          currentName = "Line " + (games.length + 1);
          currentMoves = [label];
          flushLine();
        } else if (label) {
          // It's a title or line name
          flushLine();
          // If no sectionTitle yet, this is the section header
          if (!sectionTitle && games.length === 0 && !currentName) {
            sectionTitle = label;
          } else {
            currentName = (sectionTitle ? sectionTitle + " | " : "") + label;
          }
        }
      } else if (/\d+\./.test(line)) {
        // move line
        currentMoves.push(line);
      }
    }
    flushLine();
    if (games.length) return games;
  }

  // ── Format 2: standard PGN with [Event] headers ───────────────
  var pgnText = text.split("\n").filter(function(l){ return l.trim()[0] !== ";"; }).join("\n");
  var blocks = pgnText.split(/\n\s*\n(?=\[)/).filter(function(b){ return b.trim(); });
  if (blocks.length <= 1) blocks = pgnText.split(/(?=\[Event\s)/);
  for (var bi = 0; bi < blocks.length; bi++) {
    if (!blocks[bi].trim()) continue;
    var g = parseBlock(blocks[bi].trim());
    if (g && g.moves.length) games.push(g);
  }
  if (!games.length) {
    var g = parseBlock(pgnText.trim());
    if (g && g.moves.length) games.push(g);
  }
  return games;
}

function parseMoveText(moveText, name) {
  // Strip {comments} but keep them for annotation
  var tokens = [], i = 0;
  while (i < moveText.length) {
    if (moveText[i] === "{") {
      var end = moveText.indexOf("}", i);
      if (end < 0) break;
      tokens.push({ type:"comment", val:moveText.slice(i+1,end).trim() });
      i = end + 1;
    } else if (/\s/.test(moveText[i])) {
      i++;
    } else {
      var j = i;
      while (j < moveText.length && !/[\s{]/.test(moveText[j])) j++;
      var tok = moveText.slice(i,j);
      if (tok && !/^\d+\.+$/.test(tok) && tok!=="*"&&tok!=="1-0"&&tok!=="0-1"&&tok!=="1/2-1/2")
        tokens.push({ type:"move", val:tok });
      i = j;
    }
  }
  var engine = newChess();
  var moves = [], pending = "";
  for (var ti = 0; ti < tokens.length; ti++) {
    var t = tokens[ti];
    if (t.type === "comment") { pending = t.val; continue; }
    var r = null;
    try { r = engine.move(t.val); } catch(e){}
    if (!r) try { r = engine.move(t.val.replace(/[+#]$/,"")); } catch(e){}
    if (!r) continue;
    moves.push({ san:r.san, from:r.from, to:r.to,
      promo:r.promotion?r.promotion.toUpperCase():"", comment:pending });
    pending = "";
  }
  if (!moves.length) return null;
  return { name: name, moves: moves };
}

function parseBlock(text) {
  var nameMatch = text.match(/\[Event\s+"([^"]+)"\]/);
  var name = nameMatch ? nameMatch[1] : "Line";
  var body = text.replace(/\[[^\]]*\]/g, "").trim();

  // Strip variations
  var flat = "", depth = 0;
  for (var ci = 0; ci < body.length; ci++) {
    var ch = body[ci];
    if (ch === "(") depth++;
    else if (ch === ")") depth--;
    else if (depth === 0) flat += ch;
  }

  // Tokenise: moves and {comments}
  var tokens = [], i = 0;
  while (i < flat.length) {
    if (flat[i] === "{") {
      var end = flat.indexOf("}", i);
      if (end < 0) break;
      tokens.push({ type:"comment", val:flat.slice(i+1,end).trim() });
      i = end + 1;
    } else if (/\s/.test(flat[i])) {
      i++;
    } else {
      var j = i;
      while (j < flat.length && !/[\s{]/.test(flat[j])) j++;
      var tok = flat.slice(i,j);
      var skip = !tok || /^\d+\.+$/.test(tok) || tok==="*"||tok==="1-0"||tok==="0-1"||tok==="1/2-1/2";
      if (!skip) tokens.push({ type:"move", val:tok });
      i = j;
    }
  }

  var engine = newChess();
  var moves = [], pending = "";
  for (var ti = 0; ti < tokens.length; ti++) {
    var t = tokens[ti];
    if (t.type === "comment") { pending = t.val; continue; }
    var r = null;
    try { r = engine.move(t.val); } catch(e){}
    if (!r) try { r = engine.move(t.val.replace(/[+#]$/,"")); } catch(e){}
    if (!r) continue;
    moves.push({ san:r.san, from:r.from, to:r.to,
      promo:r.promotion?r.promotion.toUpperCase():"", comment:pending });
    pending = "";
  }

  if (!moves.length) return null;
  return { name: name + " (" + Math.ceil(moves.length/2) + " moves)", moves:moves };
}

// ── Sounds ───────────────────────────────────────────────────────
var _sounds = {};
function getSound(name) {
  if (!_sounds[name]) {
    _sounds[name] = new Audio("sounds/" + name + ".ogg");
    _sounds[name].preload = "auto";
  }
  return _sounds[name];
}
function playSound(t) {
  try {
    var s = getSound(t);
    s.currentTime = 0;
    s.play().catch(function(){});
  } catch(e){}
}

// ── Board sizing ─────────────────────────────────────────────────
function runOpponent(delay) {
  if (!board || S.moveIdx >= S.moves.length || S.busy) return;
  if ((chessEngine.turn() === "w" ? "white" : "black") === S.playerColor) return;
  S.busy = true;
  delay = (delay === undefined) ? (S.mode === "drill" ? 0 : 200) : delay;
  setTimeout(function() {
    var m = S.moves[S.moveIdx];
    chessEngine.move({from:m.from, to:m.to, promotion:m.promo.toLowerCase()||undefined});
    S.fen = chessEngine.fen(); S.moveIdx++;
    playSound("move");
    board.setPosition(S.fen, true);
    updateStatusBar();
    updateMovelist();
    S.busy = false;
    if (S.moveIdx >= S.moves.length) { finishLine(); return; }
    if ((chessEngine.turn() === "w" ? "white" : "black") !== S.playerColor) {
      runOpponent();
    }
  }, delay);
}

// ── Prefix autoplay (practice mode: replay shared prefix with prev line) ──
function autoplayPrefix(moves, prevMoves, onDone) {
  // Find length of common prefix between new line and previous line
  var prefixLen = 0;
  for (var i = 0; i < Math.min(moves.length, prevMoves.length); i++) {
    if (moves[i].from === prevMoves[i].from && moves[i].to === prevMoves[i].to) {
      prefixLen = i + 1;
    } else {
      break;
    }
  }
  if (prefixLen === 0) { onDone(); return; }
  // Reset engine and replay prefix from scratch
  chessEngine = newChess();
  S.fen = chessEngine.fen();
  S.moveIdx = 0;
  board.setPosition(S.fen, false);
  var step = 0;
  function playStep() {
    if (step >= prefixLen) {
      updateStatusBar(); updateMovelist();
      onDone();
      return;
    }
    var m = moves[step];
    chessEngine.move({from:m.from, to:m.to, promotion:m.promo.toLowerCase()||undefined});
    S.fen = chessEngine.fen();
    S.moveIdx = step + 1;
    playSound("move");
    board.setPosition(S.fen, true);
    updateStatusBar(); updateMovelist();
    step++;
    if (S.moveIdx >= moves.length) { finishLine(); return; }
    setTimeout(playStep, 200);
  }
  setTimeout(playStep, 100);
}

// ── Select a game (line) ──────────────────────────────────────────
function selectGame(idx, usePrevPrefix) {
  S.gameIdx = idx;
  var game = S.games[idx];
  var prevMoves = usePrevPrefix ? S.moves.slice() : [];
  S.moves = game.moves; S.moveIdx = 0;
  chessEngine = newChess(); S.fen = chessEngine.fen();
  S.busy = false; S.lineHadError = false;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("trainer").style.display = "flex";
  if (!board) { window._pendingGame = {idx: idx, prevMoves: prevMoves}; return; }
  var params = getParams(_currentSlot);
  board.setOrientation(params.color === "black" ? _COLOR.black : _COLOR.white);
  board.setPosition(S.fen, false);
  try { board.removeMarkers(_MT.dot); } catch(e) {}
  board.disableMoveInput(); board.enableMoveInput(handleMoveInput);
  // Update nav buttons
  document.getElementById("btn-prev").style.display = S.mode === "drill" ? "none" : "";
  document.getElementById("btn-next").style.display = "";
  document.getElementById("btn-flip").style.display = S.mode === "drill" ? "none" : "";
  updateStatusBar(); updateMovelist();
  if (usePrevPrefix && prevMoves.length > 0 && S.mode === "practice") {
    S.busy = true;
    autoplayPrefix(S.moves, prevMoves, function() {
      S.busy = false;
      // Check if still need opponent to move
      if (S.moveIdx < S.moves.length &&
          (chessEngine.turn() === "w" ? "white" : "black") !== params.color) {
        runOpponent();
      }
    });
  } else {
    if ((chessEngine.turn() === "w" ? "white" : "black") !== params.color) {
      setTimeout(function() { runOpponent(); }, S.mode === "drill" ? 0 : 300);
    }
  }
}

// ── doValidate (rewritten) ────────────────────────────────────────
function doValidate(from, to, promo, prevFen) {
  var legalMoves = chessEngine.moves({square: from, verbose: true});
  var isLegal = legalMoves.some(function(m) { return m.to === to; });
  if (!isLegal) {
    S.busy = false;
    requestAnimationFrame(function() { board.setPosition(prevFen, false); });
    return;
  }
  var exp = S.moves[S.moveIdx];
  var ok = exp && from === exp.from && to === exp.to && (!exp.promo || promo === exp.promo);
  if (ok) {
    chessEngine.move({from:from, to:to, promotion:promo.toLowerCase()||undefined});
    S.fen = chessEngine.fen(); S.moveIdx++;
    playSound("move");
    board.setPosition(S.fen, true);
    updateStatusBar(); updateMovelist();
    S.busy = false;
    if (S.moveIdx >= S.moves.length) { finishLine(); return; }
    runOpponent();
  } else {
    var firstError = !S.lineHadError;
    S.lineHadError = true;
    if (firstError) { S.erroredLines.add(S.gameIdx); }
    playSound("wrong");
    showWrongFeedback();
    S.busy = false;
    requestAnimationFrame(function() { board.setPosition(prevFen, false); });
  }
}

function showWrongFeedback() {
  var strip = document.getElementById("bot-strip");
  strip.classList.add("s-wrong");
  setTimeout(function() { strip.classList.remove("s-wrong"); }, 600);
}

// ── finishLine ────────────────────────────────────────────────────
function finishLine() {
  playSound("done");
  if (board) board.disableMoveInput();
  S.scoreTotal++;
  if (!S.lineHadError) S.scoreClean++;
  updateScores();
  updateProgress();

  if (S.mode === "drill") {
    S.drillDone.add(S.gameIdx);
    if (S.drillQueue.length > 0) {
      var nx = S.drillQueue.shift();
      setTimeout(function() { selectGame(nx, false); }, 400);
    } else {
      showDrillEndModal();
    }
  } else {
    // Practice mode
    if (S.drillQueue.length > 0) {
      var nx = S.drillQueue.shift();
      setTimeout(function() { selectGame(nx, true); }, S.lineHadError ? 200 : 100);
    } else {
      // All lines done
      if (S.errorPassOnly) {
        // We just finished the error-only pass — done!
        showPracticeComplete();
      } else {
        // Check if there are errored lines to retry
        var errored = Array.from(S.erroredLines);
        if (errored.length > 0) {
          S.errorPassOnly = true;
          S.scoreClean = 0; S.scoreTotal = 0;
          updateScores();
          S.drillQueue = errored.slice();
          var nx2 = S.drillQueue.shift();
          setTimeout(function() { selectGame(nx2, false); }, 400);
        } else {
          showPracticeComplete();
        }
      }
    }
  }
}

function showPracticeComplete() {
  var strip = document.getElementById("bot-strip");
  strip.classList.add("s-done");
  document.getElementById("status-annotation").textContent = "All lines complete!";
  if (board) board.disableMoveInput();
}

function showDrillEndModal() {
  var errored = S.erroredLines;
  var title = document.getElementById("drill-modal-title");
  var body = document.getElementById("drill-modal-body");
  var errBtn = document.getElementById("drill-modal-errors-btn");
  var score = S.scoreClean + " / " + S.scoreTotal + " lines clean";
  if (errored.size > 0) {
    title.textContent = "Drill complete!";
    body.textContent = score + ". " + errored.size + " line(s) had errors.";
    errBtn.style.display = "";
  } else {
    title.textContent = "Perfect drill!";
    body.textContent = score + ". All lines clean!";
    errBtn.style.display = "none";
  }
  document.getElementById("drill-modal-overlay").classList.add("open");
}

function drillErrorsOnly() {
  document.getElementById("drill-modal-overlay").classList.remove("open");
  var errored = Array.from(S.erroredLines);
  S.drillQueue = shuffle(errored);
  S.drillDone = new Set();
  S.erroredLines = new Set();
  S.scoreClean = 0; S.scoreTotal = 0;
  updateScores(); updateProgress();
  var nx = S.drillQueue.shift();
  selectGame(nx, false);
}

function exitTraining() {
  document.getElementById("drill-modal-overlay").classList.remove("open");
  goParams();
}

// ── Start training ────────────────────────────────────────────────
function startRepById(id) {
  var pgn = getPgn(id);
  if (!pgn) return;
  var params = getParams(id);
  var games;
  try {
    games = parsePgn(pgn);
    if (!games.length) return;
  } catch(e) { return; }

  _currentSlot = id;
  S.games = games;
  S.gameIdx = -1;
  S.playerColor = params.color;
  S.mode = params.drill ? "drill" : "practice";
  S.scoreClean = 0; S.scoreTotal = 0;
  S.erroredLines = new Set();
  S.drillDone = new Set();
  S.errorPassOnly = false;
  S.prevMoves = [];

  if (S.mode === "drill") {
    S.drillQueue = shuffle(games.map(function(_,i){return i;}));
  } else {
    S.drillQueue = games.map(function(_,i){return i;});
    S.drillQueue.shift(); // first game selected directly below
  }

  updateScores(); updateProgress();
  goActive();
  document.getElementById("status-score").style.display = "";
  document.getElementById("status-prog-wrap").style.display = "";
  selectGame(S.mode === "drill" ? S.drillQueue.shift() : 0, false);
}

function startRep() {
  startRepById(_currentSlot);
}

function saveParamsAndGoHome() {
  // Params already saved on input — just navigate back
  goHome();
}

// ── Navigation ────────────────────────────────────────────────────
function stepBack() {
  if (S.mode === "drill") return;
  if (S.busy || S.moveIdx === 0) return;
  // Step back one move
  S.moveIdx--;
  chessEngine = newChess();
  // Replay all moves up to new moveIdx
  for (var i = 0; i < S.moveIdx; i++) {
    var m = S.moves[i];
    chessEngine.move({from:m.from, to:m.to, promotion:m.promo.toLowerCase()||undefined});
  }
  S.fen = chessEngine.fen();
  board.setPosition(S.fen, false);
  S.lineHadError = true; // stepping back counts as not a clean line
  if (S.gameIdx >= 0) S.erroredLines.add(S.gameIdx);
  updateStatusBar(); updateMovelist();
}

function stepForward() {
  if (S.busy) return;
  if (S.moveIdx >= S.moves.length) {
    // At end of line — go to next line
    if (S.drillQueue.length > 0) {
      var nx = S.drillQueue.shift();
      selectGame(nx, S.mode === "practice");
    }
    return;
  }
  var m = S.moves[S.moveIdx];
  chessEngine.move({from:m.from, to:m.to, promotion:m.promo.toLowerCase()||undefined});
  S.fen = chessEngine.fen(); S.moveIdx++;
  playSound("move");
  board.setPosition(S.fen, true);
  S.lineHadError = true; // using forward hint counts as not clean
  if (S.gameIdx >= 0) S.erroredLines.add(S.gameIdx);
  updateStatusBar(); updateMovelist();
  if (S.moveIdx >= S.moves.length) { finishLine(); return; }
  // If next move is opponent's, run it
  if ((chessEngine.turn() === "w" ? "white" : "black") !== S.playerColor) {
    runOpponent();
  }
}

function prevLine() {
  if (S.mode === "drill") return;
  if (S.gameIdx > 0) {
    S.drillQueue.unshift(S.gameIdx);
    selectGame(S.gameIdx - 1, true);
  }
}

function nextLine() {
  if (S.drillQueue.length > 0) {
    var nx = S.drillQueue.shift();
    selectGame(nx, S.mode === "practice");
  }
}

function flipBoard() {
  if (!board) return;
  S.playerColor = S.playerColor === "white" ? "black" : "white";
  board.setOrientation(S.playerColor === "black" ? _COLOR.black : _COLOR.white);
}

// ── UI updates ────────────────────────────────────────────────────
function updateStatusBar() {
  var lineNum = S.gameIdx >= 0 ? (S.gameIdx + 1) + "/" + S.games.length : "—";
  document.getElementById("status-line-num").textContent = lineNum;
  // Show current annotation if any
  var ann = "";
  if (S.moveIdx > 0 && S.moveIdx <= S.moves.length) {
    ann = S.moves[S.moveIdx - 1].comment || "";
  }
  if (!ann && S.gameIdx >= 0 && S.games[S.gameIdx]) {
    ann = S.games[S.gameIdx].name || "";
  }
  document.getElementById("status-annotation").textContent = ann;
}

function updateProgress() {
  var done, total;
  if (S.mode === "drill") {
    done = S.drillDone.size; total = S.games.length;
  } else {
    // In practice, progress = lines reached / total
    done = S.scoreTotal; total = S.games.length;
  }
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-txt").textContent = done + " / " + total;
  document.getElementById("status-prog-fill").style.width = pct + "%";
}

function updateScores() {
  document.getElementById("sc-clean").textContent = S.scoreClean;
  document.getElementById("sc-err").textContent = S.erroredLines.size;
  var pct = S.scoreTotal > 0 ? Math.round(S.scoreClean / S.scoreTotal * 100) + "%" : "—";
  document.getElementById("sc-pct").textContent = pct;
  document.getElementById("status-score").textContent = S.scoreClean + "/" + S.scoreTotal;
}

function updateMovelist() {
  var html = S.moves.map(function(m, i) {
    var n = i % 2 === 0 ? '<span class="ml-n">' + (Math.floor(i/2)+1) + '.</span>' : "";
    var c = ["ml-m",
      i < S.moveIdx ? "done" : "",
      i === S.moveIdx - 1 ? "current" : "",
      m.comment ? "annotated" : ""
    ].filter(Boolean).join(" ");
    return n + '<span class="' + c + '">' + m.san + '</span> ';
  }).join("");
  document.getElementById("movelist").innerHTML = html;
}

// ── Render home grid ──────────────────────────────────────────────
function renderHomeGrid() {
  var grid = document.getElementById("rep-home-grid");
  grid.innerHTML = "";
  SLOT_DEFAULTS.forEach(function(def) {
    var p = getParams(def.id);
    var isEmpty = !hasContent(def.id) && def.name === "—";
    var btn = document.createElement("button");
    btn.className = "rep-home-btn" + (isEmpty ? " empty" : "") +
      (!isEmpty && p.color === "white" ? " color-white" : "") +
      (!isEmpty && p.color === "black" ? " color-black" : "");
    // Empty slots open params to configure; filled slots start training
    btn.onclick = (function(id, empty) {
      return function() {
        if (empty) {
          // Open params panel to configure this empty slot
          _currentSlot = id;
          setImportStatus("");
          document.getElementById("sb-home").style.display = "none";
          document.getElementById("sb-params").style.display = "flex";
          refreshParamsUI();
        } else {
          startRepById(id);
        }
      };
    })(def.id, isEmpty);
    var nameEl = document.createElement("div");
    nameEl.className = "rep-home-name";
    nameEl.textContent = isEmpty ? "+" : p.name;
    btn.appendChild(nameEl);
    grid.appendChild(btn);
  });
}

// ── Helpers ───────────────────────────────────────────────────────
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

renderHomeGrid();
</script>
