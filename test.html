<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8/assets/styles/cm-chessboard.css">
</head>
<body>
<div id="status">Loading...</div>
<div id="board" style="width:300px;height:300px"></div>
<script type="module">
try {
  document.getElementById("status").textContent = "Importing...";
  const { Chessboard, COLOR, BORDER_TYPE } = await import("https://cdn.jsdelivr.net/npm/cm-chessboard@8/src/Chessboard.js");
  document.getElementById("status").textContent = "Chessboard imported OK, creating board...";
  const board = new Chessboard(document.getElementById("board"), {
    position: "start",
    assetsUrl: "https://cdn.jsdelivr.net/npm/cm-chessboard@8/assets/",
    style: { borderType: BORDER_TYPE.frame, pieces: { file: "pieces/staunty.svg" } }
  });
  document.getElementById("status").textContent = "Board created OK!";
} catch(e) {
  document.getElementById("status").textContent = "ERROR: " + e.message;
  console.error(e);
}
</script>
</body>
</html>
